name: Deploy to Azure

# Triggers on merge to main (after quality gates pass)
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.squad/**'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: git SHA)'
        required: false
        type: string

# OIDC token for Azure login — no secrets stored in GitHub
permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: transpose-sc
  CONTAINER_APP_NAME: transpose-dev-app
  ACR_NAME: transposedevacr
  ACR_LOGIN_SERVER: transposedevacr.azurecr.io
  IMAGE_NAME: transpose

jobs:
  # ---------------------------------------------------------------
  # Build: lint, test, build Docker image, push to ACR
  # ---------------------------------------------------------------
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}"
          IMAGE_LATEST="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"
          docker build -t "$IMAGE" -t "$IMAGE_LATEST" .
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"
          echo "Pushed: $IMAGE"

  # ---------------------------------------------------------------
  # Deploy: update Container App to use the new image
  # ---------------------------------------------------------------
  deploy:
    name: Deploy to Container App
    needs: build
    runs-on: ubuntu-latest
    environment: production    # requires manual approval via GitHub Environment protection rules
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy new image to Container App
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"
          echo "Deploying image: $IMAGE"
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image "$IMAGE" \
            --output none
          echo "✓ Container App updated"

      - name: Verify deployment health
        run: |
          echo "Waiting 30s for new revision to stabilize..."
          sleep 30
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Health check: https://$FQDN/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$FQDN/health" || echo "000")
          if [[ "$STATUS" == "200" ]]; then
            echo "✓ Health check passed (HTTP $STATUS)"
          else
            echo "⚠ Health check returned HTTP $STATUS — check Container App logs"
            echo "  az containerapp logs show -n ${{ env.CONTAINER_APP_NAME }} -g ${{ env.AZURE_RESOURCE_GROUP }}"
            exit 1
          fi
