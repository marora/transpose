# docker-compose.yml - Local development environment for Transpose

version: '3.9'

services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: transpose-postgres
    environment:
      POSTGRES_USER: transpose
      POSTGRES_PASSWORD: transpose_dev_password
      POSTGRES_DB: transpose
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transpose"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Transpose application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transpose-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database configuration (must use TRANSPOSE_ prefix per settings.py)
      TRANSPOSE_POSTGRES_HOST: postgres
      TRANSPOSE_POSTGRES_PORT: "5432"
      TRANSPOSE_POSTGRES_DB: transpose
      TRANSPOSE_POSTGRES_USER: transpose
      TRANSPOSE_POSTGRES_PASSWORD: transpose_dev_password
      
      # Azure services (configure with your local emulators or dev accounts)
      # Uncomment and configure when needed:
      # TRANSPOSE_DOC_INTELLIGENCE_ENDPOINT: https://your-account.cognitiveservices.azure.com/
      # TRANSPOSE_OPENAI_ENDPOINT: https://your-account.openai.azure.com/
      # TRANSPOSE_OPENAI_DEPLOYMENT: gpt-4o
      # TRANSPOSE_BLOB_STORAGE_ACCOUNT_URL: https://your-storage.blob.core.windows.net
      
      # Observability (optional for local dev)
      # APPLICATIONINSIGHTS_CONNECTION_STRING: your-connection-string
      
      # Python configuration
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./src:/app/src:ro
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: ["tail", "-f", "/dev/null"]  # Keep container running for exec commands

volumes:
  postgres_data:
